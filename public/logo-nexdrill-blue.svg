<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="40" rx="8" fill="#1e40af"/>
  
  <!-- Mining Icon -->
  <g transform="translate(8, 8)">
    <!-- Pickaxe Handle -->
    <rect x="2" y="14" width="12" height="2" rx="1" fill="#fbbf24" transform="rotate(-45 8 15)"/>
    
    <!-- Pickaxe Head -->
    <rect x="10" y="6" width="6" height="3" rx="1" fill="#9ca3af" transform="rotate(-45 13 7.5)"/>
    <rect x="8" y="8" width="3" height="6" rx="1" fill="#9ca3af" transform="rotate(-45 9.5 11)"/>
    
    <!-- Drill Bit -->
    <circle cx="16" cy="8" r="2" fill="#374151"/>
    <circle cx="16" cy="8" r="1" fill="#6b7280"/>
  </g>
  
  <!-- Text NEXDRILL -->
  <text x="32" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">NEX</text>
  <text x="32" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fbbf24">DRILL</text>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="12" r="1.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="105" cy="16" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="102" cy="20" r="1.2" fill="#fbbf24" opacity="0.7"/>
  
  <!-- Mining Tracks -->
  <rect x="85" y="28" width="30" height="1" fill="#374151" opacity="0.5"/>
  <rect x="87" y="30" width="26" height="1" fill="#374151" opacity="0.3"/>
  <rect x="89" y="32" width="22" height="1" fill="#374151" opacity="0.2"/>
</svg>